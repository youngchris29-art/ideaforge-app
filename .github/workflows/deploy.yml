name: Deploy Convex

on:
  push:
    branches: [main]

jobs:
  deploy-convex:
    name: Deploy Convex Functions
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Verify deploy key is set
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "ERROR: CONVEX_DEPLOY_KEY is empty. Check your GitHub secret."
            exit 1
          else
            echo "CONVEX_DEPLOY_KEY is set (${#CONVEX_DEPLOY_KEY} chars)"
          fi

      - name: Deploy Convex functions to production
        run: npx convex deploy
